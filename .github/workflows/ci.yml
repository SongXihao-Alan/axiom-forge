name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cli-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx python-dotenv

      - name: Basic CLI smoke tests
        run: |
          python knowledge-base/kb_query.py stats
          python knowledge-base/kb_query.py list
          python knowledge-base/kb_query.py search "Shapley"
          python knowledge-base/kb_query.py show AX-SC-001
          python knowledge-base/kb_query.py graph AX-SC-001 --depth 1
          python knowledge-base/kb_query.py value-tree
          python knowledge-base/kb_query.py help

  lean-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
      - name: Build formal proofs
        run: |
          cd formal
          lake build

  lane-b-scale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
      - name: Install deps
        run: pip install httpx python-dotenv
      - name: Run Lane B on gold standard
        run: python knowledge-base/ingest/lane_b_evaluator.py evaluate-gold --prompt-version v1
      - name: Run Lane C statistics
        run: python paper/data/lane_c_stats.py --prompt-version v1
      - name: Check convergence
        run: python -c "import json; d=json.load(open('paper/results/lane_c_feedback.json')); exit(0) if d.get('converged') else (print('WARNING: not converged'), exit(1))"

  lane-c-feedback:
    runs-on: ubuntu-latest
    needs: lane-b-scale
    steps:
      - uses: actions/checkout@v4
      - name: Check feedback JSON
        run: |
          python -c "import json; d=json.load(open('paper/results/lane_c_feedback.json')); print('Feedback JSON is valid')"

  security-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure .env not tracked
        run: |
          if [ -f .env ]; then
            echo "ERROR: .env file found in repository!"
            exit 1
          fi
          echo "Security check passed: .env not committed"

      - name: Validate KB JSON
        run: |
          find knowledge-base/nodes -name "*.json" | while read f; do
            python -m json.tool "$f" > /dev/null || (echo "Invalid JSON: $f" && exit 1)
          done
          echo "All KB JSON files are valid"
